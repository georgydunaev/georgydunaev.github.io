<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            color:white;
            background-color:black;
        }
    </style>
            <!-- overflow: scroll; -->
</head>
<body>

<div id="myhtmloutput"></div>
<SCRIPT TYPE="text/javascript">
let myaddr = "https://raw.githubusercontent.com/georgydunaev/variousreleases/refs/heads/main";

let htmladdr = myaddr.concat("/","output",".","html");

async function getText() {
    let text = sessionStorage.getItem("text");

    if (!text) {
        const res = await fetch(htmladdr);
        text = await res.text();
        sessionStorage.setItem("text", text);
        console.log("The text has been downloaded. (async)")
    }

    return text;
}

// synchronous function (it is not used)
function myOldDownload() {

fetch(htmladdr)
  .then(res => res.text())
  .then(html => {
    document.getElementById("myhtmloutput").innerHTML = html
  });

console.log("The text has been downloaded. (sync)")

}

async function myNewDownload() {
  document.getElementById("myhtmloutput").innerHTML = await getText();
  window.scrollTo(0,1550);
}

myNewDownload();

</script>


</body>
</html>
